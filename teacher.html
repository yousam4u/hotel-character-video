<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 캐릭터 홍보영상 제작소 — 교사용 슬라이드</title>
<style>
  :root{
    --navy:#12162A; --navy2:#1B2140; --navy3:#242B52;
    --indigo:#3B3F91; --violet:#8B6BD4; --pink:#F0577F;
    --muted:#9AA0C9; --line:#2E3560;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--navy); color:#EDEBF7;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;
    overflow:hidden;
  }
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}

  .deck{position:relative; width:100%; height:calc(100vh - 46px); overflow:hidden;}
  .slide{
    position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:60px 70px; opacity:0; transform:translateX(30px); transition:opacity .4s ease, transform .4s ease;
    pointer-events:none; overflow-y:auto;
  }
  .slide > *{width:100%; max-width:1080px;}
  .slide > .badge, .slide > .qr-box{width:auto; align-self:flex-start; margin-left:max(0px, calc((100% - 1080px)/2));}
  .slide.active{opacity:1; transform:translateX(0); pointer-events:auto;}
  .kicker{font-size:15px; letter-spacing:3px; color:var(--violet); font-weight:800; text-transform:uppercase; margin:0 0 16px;}
  h1{font-size:50px; font-weight:900; letter-spacing:-1px; margin:0 0 18px; line-height:1.2;}
  h2{font-size:38px; font-weight:900; letter-spacing:-0.5px; margin:0 0 24px;}
  p.lead{font-size:21px; color:var(--muted); line-height:1.65;}

  .grid{display:grid; gap:18px; margin-top:12px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .card{
    background:var(--navy2); border:1px solid var(--line); border-radius:14px; padding:22px 24px;
  }
  .card .num{
    display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px;
    border-radius:50%; background:linear-gradient(135deg,var(--violet),var(--pink)); color:#fff;
    font-weight:800; font-size:16px; margin-bottom:12px;
  }
  .card h3{margin:0 0 8px; font-size:20px; font-weight:800;}
  .card p{margin:0; font-size:16.5px; color:var(--muted); line-height:1.55;}

  .flow{display:flex; align-items:center; gap:10px; margin-top:24px; flex-wrap:wrap;}
  .flow .step{
    background:var(--navy2); border:1px solid var(--line); border-radius:12px; padding:16px 18px;
    font-size:17px; font-weight:700; flex:1; min-width:140px; text-align:center;
  }
  .flow .arrow{color:var(--muted); font-size:22px;}

  .warn{
    background:#3A1B28; border:1px solid #7A3550; border-left:5px solid var(--pink);
    border-radius:10px; padding:20px 24px; margin-top:20px; font-size:17px; line-height:1.6;
  }
  .warn b{color:#FFB4C8;}

  .tip{
    background:#1A2E24; border-left:5px solid #5CB878; border-radius:10px; padding:18px 22px;
    margin-top:16px; font-size:17px; color:#BEEBCB; line-height:1.6;
  }

  table.tbl{border-collapse:collapse; margin-top:16px; width:100%;}
  table.tbl th, table.tbl td{border:1px solid var(--line); padding:13px 16px; font-size:16.5px; text-align:left;}
  table.tbl th{background:var(--navy3); color:#fff; font-weight:800;}
  table.tbl td{color:var(--muted);}

  .cover h1{font-size:64px;}
  .badge{
    display:inline-block; margin-top:26px; padding:12px 22px; border-radius:999px;
    background:var(--navy2); border:1px solid var(--line); font-size:16px; color:var(--muted);
  }
  .qr-box{
    margin-top:26px; display:inline-block; background:#fff; color:#111; padding:16px 20px;
    border-radius:12px; font-size:15px; max-width:680px;
  }

  /* 체크리스트 (기획서/대본/캐릭터 설계 필수 요소) */
  .checklist{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .checklist .item{
    background:var(--navy2); border:1px solid var(--line); border-radius:12px;
    padding:14px 22px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  .checklist .item .chk{color:#8CE0A8; font-size:19px; flex:0 0 auto;}
  .checklist .item .label{font-weight:800; font-size:19px; color:#fff; min-width:190px;}
  .checklist .item .ex{font-size:16px; color:var(--muted);}
  .checklist .item .ex b{color:#C9C2F0; font-weight:700;}

  /* 단계별 순서 (HeyGen·Flow 생성 순서) */
  .steplist{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .steplist .srow{
    display:flex; align-items:center; gap:16px; background:var(--navy2); border:1px solid var(--line);
    border-radius:12px; padding:14px 20px;
  }
  .steplist .snum{
    flex:0 0 36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--violet),var(--pink));
    color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px;
  }
  .steplist .stext{font-size:17.5px; font-weight:600; line-height:1.5; color:#EDEBF7;}
  .steplist .stext .menu{color:#B9A9E0; font-weight:800;}

  /* AI 윤리 예시 프롬프트 슬라이드 — 낮은 해상도에서도 한 화면에 */
  .quiz-prompt-grid .card{padding:14px 18px;}
  .quiz-prompt-grid .card h3{font-size:17px; margin-bottom:6px;}
  .quiz-prompt-grid .card p{line-height:1.5;}

  /* 아이스브레이킹 퀴즈 */
  .quiz-list{display:flex; flex-direction:column; gap:12px; margin-top:16px;}
  .quiz-card{
    background:var(--navy2); border:1px solid var(--line); border-radius:14px;
    padding:16px 22px; cursor:pointer; display:flex; align-items:center; gap:16px;
    transition:border-color .2s ease, background .2s ease; user-select:none;
  }
  .quiz-card:hover{border-color:var(--violet);}
  .quiz-card .qnum{
    flex:0 0 38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--pink));
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:17px;
  }
  .quiz-card .qbody{flex:1;}
  .quiz-card .qtext{font-size:19px; font-weight:800; color:#EDEBF7; line-height:1.4;}
  .quiz-card .qanswer{
    display:none; margin-top:8px; font-size:19px; font-weight:900;
    color:#8CE0A8; animation:popIn .35s ease;
  }
  .quiz-card .qhintlabel{
    flex:0 0 auto; font-size:12.5px; color:var(--muted); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; transition:all .2s ease;
  }
  .quiz-card.revealed{background:#182642; border-color:#3B6D52;}
  .quiz-card.revealed .qanswer{display:block;}
  .quiz-card.revealed .qhintlabel{color:#8CE0A8; border-color:#3B6D52;}
  @keyframes popIn{from{opacity:0; transform:translateY(-4px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}
  @media(max-width:700px){
    .quiz-card{padding:12px 14px; gap:10px;}
    .quiz-card .qtext{font-size:15.5px;} .quiz-card .qanswer{font-size:16px;}
    .quiz-card .qhintlabel{display:none;}
  }

  /* 상단 탭 네비게이션 — 슬라이드/학생용 도구/프롬프트/게시판 이동 */
  .toptabs{
    position:fixed; top:0; left:0; right:0; height:46px; z-index:20;
    display:flex; align-items:center; gap:6px; padding:0 16px;
    background:var(--navy2); border-bottom:1px solid var(--line); overflow-x:auto;
  }
  .toptabs .tab{
    flex:0 0 auto; background:transparent; border:1.5px solid transparent; color:var(--muted);
    padding:8px 16px; border-radius:999px; font-size:13.5px; font-weight:700; white-space:nowrap;
    font-family:inherit; cursor:pointer;
  }
  .toptabs .tab:hover{color:#fff;}
  .toptabs .tab.active{background:linear-gradient(135deg,var(--violet),var(--pink)); color:#fff;}
  .tabpanel{display:none;}
  .tabpanel.active{display:block;}
  .tabpanel.iframe-panel{position:fixed; top:46px; left:0; right:0; bottom:0;}
  .tabframe{width:100%; height:100%; border:0; display:block;}
  #panel-slides{margin-top:46px;}
  @media(max-width:700px){ .toptabs{height:40px;} .toptabs .tab{padding:6px 12px; font-size:12px;} .tabpanel.iframe-panel{top:40px;} #panel-slides{margin-top:40px;} }

  .progress{position:fixed; top:46px; left:0; height:4px; background:linear-gradient(90deg,var(--violet),var(--pink)); transition:width .3s ease; z-index:10;}
  .navbar{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px; background:var(--navy2); border:1px solid var(--line);
    border-radius:999px; padding:10px 16px; z-index:10;
  }
  .navbar button{background:transparent; border:none; color:#fff; cursor:pointer; font-size:18px; padding:4px 8px;}
  .navbar button:hover{color:var(--violet);}
  .dots{display:flex; gap:6px;}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--line); transition:background .2s ease;}
  .dot.on{background:var(--pink);}
  .counter{font-size:12px; color:var(--muted); font-family:ui-monospace,monospace; min-width:44px; text-align:center;}
  @media(max-width:700px){
    .slide{padding:36px 22px;} h1{font-size:32px;} h2{font-size:25px;} p.lead{font-size:17px;}
    .grid-3{grid-template-columns:1fr;} .grid-2{grid-template-columns:1fr;} .grid-4{grid-template-columns:repeat(2,1fr);}
    .checklist .item .label{min-width:100%;} .steplist .stext{font-size:15.5px;}
  }
  .session-badge{
    position:fixed; top:62px; left:24px; z-index:11;
    padding:7px 16px; border-radius:999px; font-size:13px; font-weight:800;
    letter-spacing:0.5px; color:#fff; transition:background .3s ease;
  }
  @media(max-width:700px){ .session-badge{font-size:11px; padding:6px 12px; top:52px; left:14px;} }
</style>
</head>
<body>
<div class="toptabs" id="toptabs">
  <button class="tab active" data-tab="slides">📊 슬라이드</button>
  <button class="tab" data-tab="student">🎬 학생용 도구</button>
  <button class="tab" data-tab="prompt">✍️ 프롬프트 가이드</button>
  <button class="tab" data-tab="board">📋 자료 게시판</button>
</div>

<div class="tabpanel active" id="panel-slides">
  <div class="progress" id="progress"></div>
  <div class="session-badge" id="sessionBadge">전체 개요</div>
  <div class="deck" id="deck"></div>
  <div class="navbar">
    <button id="prevBtn">◀</button>
    <div class="dots" id="dots"></div>
    <button id="nextBtn">▶</button>
    <span class="counter" id="counter">1/10</span>
  </div>
</div>
<div class="tabpanel iframe-panel" id="panel-student"><iframe class="tabframe" data-src="https://yousam4u.github.io/hotel-character-video/"></iframe></div>
<div class="tabpanel iframe-panel" id="panel-prompt"><iframe class="tabframe" data-src="https://yousam4u.github.io/hotel-character-video/prompt.html"></iframe></div>
<div class="tabpanel iframe-panel" id="panel-board"><iframe class="tabframe" data-src="https://yousam4u.github.io/hotel-character-video/board.html"></iframe></div>

<script>
// ---- 상단 탭 전환 ----
document.querySelectorAll('.toptabs .tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const name = btn.dataset.tab;
    document.querySelectorAll('.toptabs .tab').forEach(b=> b.classList.toggle('active', b===btn));
    document.querySelectorAll('.tabpanel').forEach(p=> p.classList.toggle('active', p.id === 'panel-'+name));
    const panel = document.getElementById('panel-'+name);
    const frame = panel.querySelector('iframe[data-src]');
    if(frame){ frame.src = frame.dataset.src; frame.removeAttribute('data-src'); }
  });
});
</script>

// ---- 아이스브레이킹 퀴즈: 클릭하면 정답 공개 + 효과음 ----
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, startDelay, duration, volume, type){
  const ctx = getAudioCtx();
  const t = ctx.currentTime + startDelay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(volume, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t); osc.stop(t + duration + 0.05);
}
function playCorrectSound(){ // 딩동댕~ 정답 차임
  playTone(523.25, 0,    0.45, 0.22, 'sine');  // 도
  playTone(659.25, 0.10, 0.45, 0.22, 'sine');  // 미
  playTone(783.99, 0.20, 0.60, 0.24, 'sine');  // 솔
  playTone(1046.5, 0.32, 0.80, 0.20, 'sine');  // 높은 도
}
function playHideSound(){ // 정답 다시 숨길 때 짧은 톡 소리
  playTone(392, 0, 0.15, 0.12, 'triangle');
}
deck.addEventListener('click', (e)=>{

  if(!card) return;
  const wasRevealed = card.classList.contains('revealed');
  card.classList.toggle('revealed');
  const hint = card.querySelector('.qhintlabel');
  if(!wasRevealed){
    playCorrectSound();
    if(hint) hint.textContent = '정답! 🎉';
  }else{
    playHideSound();
    if(hint) hint.textContent = '클릭해서 정답 확인';
  }
});

  const dx = e.changedTouches[0].clientX - touchX;
